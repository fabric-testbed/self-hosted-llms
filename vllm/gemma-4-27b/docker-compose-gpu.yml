services:
  vllm-gemma-4-27b:
    # Gemma 4 requires a special vLLM container. See docker-compose.yml for details.
    image: vllm/vllm-openai:gemma4-cu130
    container_name: vllm-gemma-4-27b
    hostname: vllm-gemma-4-27b

    environment:
      # DGX Spark optimizations
      - CUDA_MANAGED_FORCE_DEVICE_ALLOC=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - VLLM_USE_V1=1

      # HuggingFace token for gated models
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/root/.cache/huggingface

    volumes:
      # Shared HuggingFace cache
      - huggingface_cache:/root/.cache/huggingface

    # GPU configuration - explicit GPU assignment
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']  # Use GPU 0
              capabilities: [gpu]

    shm_size: 16gb
    ipc: host

    ulimits:
      memlock: -1
      stack: 67108864

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    command: >
      vllm serve google/gemma-4-26B-A4B-it
      --served-model-name gemma-4-27b
      --tensor-parallel-size 1
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --enable-prefix-caching
      --max-num-seqs 128
      --download-dir /root/.cache/huggingface
      --host 0.0.0.0
      --port 8000

    # Join shared network for nginx
    networks:
      - vllm_network

volumes:
  huggingface_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.cache/huggingface

networks:
  vllm_network:
    name: vllm_network
    driver: bridge
    external: true
