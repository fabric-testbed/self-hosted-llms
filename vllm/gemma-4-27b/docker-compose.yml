services:
  vllm-gemma-4-27b:
    # Gemma 4 requires a special vLLM container with Gemma 4 support.
    # Standard NGC vLLM images do NOT support Gemma 4.
    #
    # Pull the Gemma 4 container:
    #   docker pull vllm/vllm-openai:gemma4-cu130
    #
    # See: https://build.nvidia.com/spark/vllm (Model Support Matrix)
    image: vllm/vllm-openai:gemma4-cu130
    container_name: vllm-gemma-4-27b
    hostname: vllm-gemma-4-27b

    ports:
      - "8000:8000"

    environment:
      # DGX Spark optimizations
      - CUDA_MANAGED_FORCE_DEVICE_ALLOC=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}

      # HuggingFace token for gated models
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/root/.cache/huggingface

    volumes:
      # Shared HuggingFace cache
      - huggingface_cache:/root/.cache/huggingface

    # GPU configuration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              #device_ids: ['0']  # Use GPU 0
              capabilities: [gpu]

    shm_size: 16gb
    ipc: host

    ulimits:
      memlock: -1
      stack: 67108864

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # 5 minutes for model loading

    # Gemma 4 26B A4B IT - Google MoE (26B total, 3.8B active)
    # Features: multimodal (text + image), tool calling, reasoning, 256K context
    # Memory: ~50GB BF16, runs as fast as a 4B dense model
    #
    # Alternative models (change the model name below):
    #   google/gemma-4-31B-it          - Dense 31B (larger, no MoE)
    #   nvidia/Gemma-4-31B-IT-NVFP4    - Dense 31B NVFP4 quantized (~8GB)
    #   google/gemma-4-E4B-it          - Efficient 4B
    #   google/gemma-4-E2B-it          - Efficient 2B
    # Note: vllm/vllm-openai entrypoint already runs "vllm serve",
    # so command only needs the model name and flags.
    command: >
      google/gemma-4-26B-A4B-it
      --served-model-name gemma-4-27b
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.85
      --enable-prefix-caching
      --max-num-seqs 128
      --download-dir /root/.cache/huggingface
      --host 0.0.0.0
      --port 8000

    # Join shared network for nginx
    networks:
      - vllm_network

volumes:
  huggingface_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.cache/huggingface

networks:
  vllm_network:
    name: vllm_network
    driver: bridge
    external: true  # Network created by first model
