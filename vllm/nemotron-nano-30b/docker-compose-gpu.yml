services:
  vllm-nemotron-nano-30b:
    image: nvcr.io/nvidia/vllm:26.03-py3
    container_name: vllm-nemotron-nano-30b
    hostname: vllm-nemotron-nano-30b

    environment:
      # DGX Spark optimizations
      - CUDA_MANAGED_FORCE_DEVICE_ALLOC=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - VLLM_USE_V1=1

      # HuggingFace token for gated models
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/root/.cache/huggingface

    volumes:
      # Shared HuggingFace cache
      - huggingface_cache:/root/.cache/huggingface
      # Custom reasoning parser (download with setup.sh)
      - ./nano_v3_reasoning_parser.py:/root/nano_v3_reasoning_parser.py

    # GPU configuration - explicit GPU assignment
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']  # Use GPU 0
              capabilities: [gpu]

    shm_size: 16gb
    ipc: host

    ulimits:
      memlock: -1
      stack: 67108864

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    command: >
      vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      --served-model-name nemotron-nano-30b
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser-plugin /root/nano_v3_reasoning_parser.py
      --reasoning-parser nano_v3
      --tensor-parallel-size 1
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --enable-prefix-caching
      --max-num-seqs 8
      --download-dir /root/.cache/huggingface
      --trust-remote-code
      --host 0.0.0.0
      --port 8000

    # Join shared network for nginx
    networks:
      - vllm_network

volumes:
  huggingface_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.cache/huggingface

networks:
  vllm_network:
    name: vllm_network
    driver: bridge
    external: true
