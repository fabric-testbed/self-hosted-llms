services:
  vllm-qwen-14b-awq:
    image: vllm/vllm-openai:v0.6.6.post1
    container_name: vllm-qwen-14b-awq
    hostname: vllm-qwen-14b-awq

    environment:
      # DGX Spark optimizations
      - CUDA_MANAGED_FORCE_DEVICE_ALLOC=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}

      # HuggingFace token for gated models
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/root/.cache/huggingface

    volumes:
      # Shared HuggingFace cache
      - huggingface_cache:/root/.cache/huggingface
      - ./chat.template:/root/chat.template

    # GPU configuration - use both GPUs for tensor parallelism
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

    shm_size: 16gb
    ipc: host

    ulimits:
      memlock: -1
      stack: 67108864

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # 5 minutes for model loading

    command: >
      --model Qwen/Qwen2.5-14B-Instruct-AWQ
      --served-model-name qwen-14b-awq
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --gpu-memory-utilization 0.95
      --tensor-parallel-size 2
      --trust-remote-code
      --download-dir /root/.cache/huggingface

    # Join shared network for nginx
    networks:
      - vllm_network

volumes:
  huggingface_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/.cache/huggingface

networks:
  vllm_network:
    name: vllm_network
    driver: bridge
    external: true  # Network created by first model
